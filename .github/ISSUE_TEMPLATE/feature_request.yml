name: Feature Request
description: Propose a new feature or enhancement
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What problem would this feature solve? Describe your use case.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: How do you envision this working?
  - type: textarea
    attributes:
      label: Alternatives considered
      description: Have you found any workarounds or alternative approaches?
